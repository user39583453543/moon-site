<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXY</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --pink:#ff2ea6;
  --bg:#020202;
}

body{
  font-family:'Barlow';
  background:var(--bg);
  color:white;
  overflow:hidden;
  cursor:none;
}

/* INTRO GLITCH */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.glitch{
  font-family:'Bebas Neue';
  font-size:100px;
  position:relative;
  color:white;
  text-shadow:0 0 20px var(--pink);
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  20%{transform:translate(-2px,2px);}
  40%{transform:translate(2px,-2px);}
  60%{transform:translate(-2px,1px);}
  80%{transform:translate(2px,1px);}
  100%{transform:translate(0);}
}

/* MAIN */
#main{
  display:none;
  height:100vh;
  scroll-snap-type:y mandatory;
  overflow-y:scroll;
}

/* SECTIONS */
.panel{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  scroll-snap-align:start;
  position:relative;
}

/* HERO */
.hero h1{
  font-size:180px;
  font-family:'Bebas Neue';
  text-shadow:0 0 80px var(--pink);
}

.hero p{
  color:var(--pink);
}

/* CARDS */
.card{
  padding:30px;
  margin:20px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:scale(1.1);
  box-shadow:0 0 60px var(--pink);
}

/* WK FULL SCREEN */
#wkFull{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
  z-index:999;
}

#wkFull h2{
  font-size:60px;
  font-family:'Bebas Neue';
}

#wkFull p{
  max-width:700px;
  margin-top:20px;
  color:#aaa;
  line-height:1.6;
}

.btn{
  margin-top:30px;
  padding:12px 25px;
  border:1px solid var(--pink);
  color:var(--pink);
  text-decoration:none;
}

.btn:hover{
  background:var(--pink);
  color:black;
}

/* CURSOR */
.cursor{
  width:12px;
  height:12px;
  background:var(--pink);
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  box-shadow:0 0 30px var(--pink);
}

/* BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" onclick="start()">
  <div class="glitch">VEXY</div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- MAIN -->
<div id="main">

<canvas id="bg"></canvas>
<div class="cursor"></div>

<!-- HERO -->
<section class="panel hero">
  <h1>VEXY</h1>
  <p>AGGRESSIVE • LEADER • 11K+</p>
</section>

<!-- PROFILE -->
<section class="panel">
  <div class="card">PLAYSTYLE: AGRO</div>
  <div class="card">HOURS: 11K+</div>
  <div class="card">STRENGTH: LEADER</div>
</section>

<!-- ACHIEVEMENTS -->
<section class="panel">
  <div class="card" onclick="openWK()">WK TEAM</div>
  <div class="card">RISE</div>
  <div class="card">TURRETS</div>
</section>

<!-- SOCIALS -->
<section class="panel">
  <a href="https://www.youtube.com/@VexyRustt" target="_blank" class="btn">YouTube</a>
</section>

</div>

<!-- WK FULL -->
<div id="wkFull" onclick="closeWK()">
  <h2>wK TEAM</h2>
  <p>
    Founded in 2020 by Crd. One of the most competitive Rust teams in history.
    Dominating Rustoria, Vital and Atlas servers with thousands in earnings.
  </p>
  <a href="https://discord.gg/wkrust" target="_blank" class="btn">JOIN DISCORD</a>
</div>

<script>
function start(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
  let m=document.getElementById("music");
  m.volume=0;
  m.play();
  let v=0;
  let fade=setInterval(()=>{
    v+=0.02;
    m.volume=v;
    if(v>=1) clearInterval(fade);
  },100);
}

/* WK */
function openWK(){
  document.getElementById("wkFull").style.display="flex";
}
function closeWK(){
  document.getElementById("wkFull").style.display="none";
}

/* CURSOR */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.transform=`translate(${e.clientX}px,${e.clientY}px)`;
});

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<200;i++){
  p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(dot=>{
    dot.y-=0.4;
    if(dot.y<0) dot.y=canvas.height;
    ctx.fillStyle=Math.random()>0.5?"#ff2ea6":"white";
    ctx.fillRect(dot.x,dot.y,dot.s,dot.s);
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
